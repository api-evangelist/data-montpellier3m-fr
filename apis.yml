aid: data-montpellier3m-fr
name: Montpellier Open Data
description: >-
  Montpellier Open Data is a municipal government open-data portal for France running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 0 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
